short_bio: >-
  <p>
    I am a B.S. student at the <a href="https://www.smee.uestc.edu.cn/" target="_blank">School of Mechanical and Electrical Engineering (SMEE)</a>, <a href="https://www.uestc.edu.cn/" target="_blank">University of Electronic Science and Technology of China (UESTC)</a>. I am a Research Assistant at <a href="http://relialab.org/" target="_blank">ReliaLab</a> (Center for System Reliability and Safety, China), advised by <a href="https://scholar.google.com/citations?user=nffqj1QAAAAJ" target="_blank">Zuoyi Chen</a> and <a href="https://www.researchgate.net/profile/Hong-Zhong-Huang" target="_blank">Prof. Hong-Zhong Huang</a>. Also a Research Assistant at EPICLab, <a href="https://sai.sjtu.edu.cn/" target="_blank">SAI of SJTU</a>, advised by <a href="http://www.zhanglinfeng.tech/" target="_blank">Linfeng Zhang</a>.
  </p>
  <p>
    My research interests focus on AI4Reliability including zero/few-shot learning, transfer learning, and LLM.
  </p>

